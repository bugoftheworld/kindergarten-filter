<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通勤路線規劃工具</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 24px;
        }
        h1 { 
            text-align: center; 
            color: #2c3e50;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
        }
        select:focus {
            border-color: #5ebdbd;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .route-option {
            padding: 16px;
            background: white;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 4px solid #5ebdbd;
        }
        .route-option.recommended {
            border-left-color: #ff6b6b;
            background: #fff5f5;
        }
        .route-time {
            font-size: 24px;
            font-weight: bold;
            color: #5ebdbd;
        }
        .route-cost {
            color: #666;
            font-size: 14px;
        }
        .route-steps {
            margin-top: 12px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 14px;
        }
        .route-steps ol {
            margin: 8px 0 0 0;
            padding-left: 20px;
        }
        .recommend-badge {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 通勤路線規劃工具</h1>
        
        <div class="form-group">
            <label>📍 從哪裡出發？</label>
            <select id="start">
                <option value="汐止火車站">汐止火車站</option>
                <option value="汐止住家">汐止住家</option>
            </select>
        </div>

        <div class="form-group">
            <label>🚗 交通方式</label>
            <select id="transport">
                <option value="開車">開車</option>
                <option value="火車">火車（區間車）</option>
                <option value="機車">機車</option>
            </select>
        </div>

        <div class="form-group">
            <label>🔄 轉乘站/停車點</label>
            <select id="transfer">
                <option value="無">不需要轉乘（直接到）</option>
                <option value="南港站">南港站（捷運）</option>
                <option value="南港展覽館站">南港展覽館站（捷運）</option>
                <option value="後山埤站">後山埤站（捷運）</option>
                <option value="松山火車站">松山火車站（火車）</option>
                <option value="昆陽站">昆陽站（捷運）</option>
                <option value="南港軟體園區停車場">南港軟體園區停車場</option>
            </select>
        </div>

        <div class="form-group">
            <label>🏢 目的地</label>
            <select id="destination">
                <option value="松仁路公司">松仁路公司（信義區）</option>
                <option value="美麗華">美麗華（老公公司）</option>
            </select>
        </div>

        <button onclick="calculateRoute()">🔍 計算路線</button>

        <div class="result" id="result">
            <h2>📊 推薦路線</h2>
            <div id="routes"></div>
        </div>
    </div>

    <script>
        const timeData = {
            '開車': {
                '無': { time: 45, cost: '$$$', steps: ['開車直接到目的地'] },
                '南港站': { time: 35, cost: '$$', steps: ['開車到南港站停車', '轉乘捷運板南線', '到站後步行到公司'] },
                '南港展覽館站': { time: 35, cost: '$$', steps: ['開車到南港展覽館站停車', '轉乘捷運板南線', '到站後步行到公司'] },
                '後山埤站': { time: 30, cost: '$$', steps: ['開車到後山埤站停車', '轉乘捷運板南線', '到站後步行到公司'] },
                '松山火車站': { time: 30, cost: '$$', steps: ['開車到松山火車站停車', '轉乘火車到汐止', '再轉捷運...（較繞）'] },
                '昆陽站': { time: 35, cost: '$$', steps: ['開車到昆陽站（不好停）', '轉乘捷運', '到站後步行到公司'] },
                '南港軟體園區停車場': { time: 40, cost: '$', steps: ['開車到南港軟體園區停車', '轉乘捷運板南線', '到站後步行到公司'] }
            },
            '火車': {
                '無': { time: 40, cost: '$', steps: ['搭區間車直接到松山火車站', '步行到公司'] },
                '南港站': { time: 35, cost: '$$', steps: ['搭火車到松山站', '轉乘捷運', '到站後步行到公司'] },
                '南港展覽館站': { time: 40, cost: '$$', steps: ['搭火車到南港站', '轉乘捷運板南線', '到站後步行到公司'] },
                '後山埤站': { time: 45, cost: '$$', steps: ['搭火車到松山站', '轉乘捷運', '後山埤站步行到公司'] },
                '松山火車站': { time: 25, cost: '$', steps: ['搭區間車到松山火車站', '步行或騎 Ubike 到公司'] },
                '昆陽站': { time: 40, cost: '$$', steps: ['搭火車到南港站', '轉捷運到昆陽站', '步行到公司'] },
                '南港軟體園區停車場': { time: 50, cost: '$$', steps: ['搭火車到南港站', '步行到軟體園區', '再開車...（不合邏輯）'] }
            },
            '機車': {
                '無': { time: 35, cost: '$', steps: ['騎機車直接到目的地'] },
                '南港站': { time: 30, cost: '$', steps: ['騎機車到南港站停車格', '轉乘捷運'] },
                '南港展覽館站': { time: 30, cost: '$', steps: ['騎機車到南港展覽館站', '轉乘捷運'] },
                '後山埤站': { time: 25, cost: '$', steps: ['騎機車到後山埤站', '轉乘捷運'] },
                '松山火車站': { time: 25, cost: '$', steps: ['騎機車到松山火車站', '轉火車或步行'] },
                '昆陽站': { time: 25, cost: '$', steps: ['騎機車到昆陽站', '轉乘捷運'] },
                '南港軟體園區停車場': { time: 35, cost: '$', steps: ['騎機車到南港軟體園區', '轉乘捷運'] }
            }
        };

        function calculateRoute() {
            const start = document.getElementById('start').value;
            const transport = document.getElementById('transport').value;
            const transfer = document.getElementById('transfer').value;
            const destination = document.getElementById('destination').value;
            
            let data = timeData[transport][transfer];
            
            if (!data) {
                data = timeData[transport]['無'];
            }
            
            // 調整時間（加上送小孩的時間）
            let totalTime = data.time + 10; // 假設送小孩增加 10 分鐘
            
            // 產生結果
            const routesDiv = document.getElementById('routes');
            routesDiv.innerHTML = `
                <div class="route-option recommended">
                    <span class="recommend-badge">最推薦</span>
                    <div class="route-time">${totalTime} 分鐘</div>
                    <div class="route-cost">💰 費用：${data.cost}</div>
                    <div class="route-steps">
                        <strong>📋 步驟：</strong>
                        <ol>
                            ${data.steps.map(s => `<li>${s}</li>`).join('')}
                        </ol>
                    </div>
                </div>
                <p style="color: #666; font-size: 14px;">
                    💡 提示：選擇「轉乘站/停車點」可以避開信義區的停車問題，通常會比直接開車进去更省時間和費用。
                </p>
            `;
            
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
