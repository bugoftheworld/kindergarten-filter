        .tab {

            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #888;
            border-bottom: 3px solid transparent;
            font-size: 14px;
        }
        .tab.active {

        }
        .tab-section { display: none; }

            padding: 20px 25px;
            background: #fafbfc;
            border-bottom: 1px solid #eee;
        }
        .filter-row {

            flex-wrap: wrap;
            gap: 12px;
        }
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        .filter-group label {

            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
        }

            font-size: 14px;

            { rank: 17, name: "插角森林實驗小學附設幼兒園", address: "三峽區插角里39號", time: 20, type: "公立", convenience: "warning", tags: ["偏鄉"], age: "3-5歲", people: 30 },
            { rank: 18, name: "五寮國小附設幼兒園", address: "三峽區五寮里69號", time: 25, type: "公立", convenience: "warning", tags: ["偏鄉"], age: "3-5歲", people: 30 },
            { rank: 19, name: "有木國小附設幼兒園", address: "三峽區有木里131號", time: 30, type: "公立", convenience: "warning", tags: ["偏鄉"], age: "3-5歲", people: 30 }
        ];

        let currentData = sanxiaData;

        // ========== Tab 切換 ==========
        document.querySelectorAll('.tabs > .tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tabs > .tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
                document.getElementById(tab.dataset.tab + '-section').classList.add('active');
            });
        });

        // ========== 通勤方案 Render ==========
        function renderRoutes() {
            const filter = document.getElementById('routeFilter').value;
            let filtered = commuteData;
            
            if (filter === 'best') filtered = commuteData.filter(r => r.badges.includes('best'));
            if (filter === 'fastest') filtered = commuteData.slice(0, 2);
            if (filter === 'cheapest') filtered = commuteData.filter(r => r.tags.includes('省停車費') || r.tags.includes('雨天首選'));
            if (filter === 'weather') filtered = [commuteData[3], commuteData[0]];
            
            document.getElementById('routeCount').textContent = filtered.length;
            
            const results = document.getElementById('routeResults');
            results.innerHTML = filtered.map(item => {
                const badgeHtml = item.badges.map(b => {
                    const labels = { best: '最推薦', recommended: '推薦', alternative: '替代方案' };
                    return `<span class="card-badge badge-${b}">${labels[b]}</span>`;
                }).join('');
                
                const tagHtml = item.tags.map(tag => `<span class="tag tag-excellent">${tag}</span>`).join('');
                
                return `
                    <div class="route-card ${item.badges.includes('best') ? 'best' : item.badges.includes('recommended') ? 'recommended' : ''}">
                        <div class="card-header">
                            <div>
                                <span class="rank-badge">${item.rank}</span>
                                <span class="card-title">${item.name}</span>
                            </div>
                            ${badgeHtml}
                        </div>
                        
                        <div class="route-summary">
                            <div class="route-stat">
                                <div class="route-stat-value">${item.summary.time}</div>
                                <div class="route-stat-label">分鐘</div>
                            </div>
                            <div class="route-stat">
                                <div class="route-stat-value">${item.summary.cost}</div>
                                <div class="route-stat-label">費用</div>
                            </div>
                            <div class="route-stat">
                                <div class="route-stat-value">${item.summary.convenience}</div>
                                <div class="route-stat-label">便利度</div>
                            </div>
                        </div>
                        
                        <div class="route-steps">
                            <strong>📋 步驟：</strong>
                            <ol>
                                ${item.steps.map(s => `<li>${s}</li>`).join('')}
                            </ol>
                        </div>
                        
                        <div class="route-pros-cons">
                            <div class="route-pros">
                                <strong>✅ 優點</strong>
                                ${item.pros.map(p => `<div>${p}</div>`).join('')}
                            </div>
                            <div class="route-cons">
                                <strong>⚠️ 缺點</strong>
                                ${item.cons.map(c => `<div>${c}</div>`).join('')}
                            </div>
                        </div>
                        
                        <div class="convenience-tags">${tagHtml}</div>
                        
                        ${item.note ? `<div class="route-note">${item.note}</div>` : ''}
                        
                        <a class="map-link" href="${item.mapUrl}" target="_blank">
                            📍 查看 Google Maps 路線
                        </a>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('routeFilter').addEventListener('change', renderRoutes);
        renderRoutes();

        // ========== 幼兒園 Render ==========
        function renderKindergarten() {
            const timeFilter = document.getElementById('filterTime').value;
            const typeFilter = document.getElementById('filterType').value;
            
            let filtered = currentData.filter(item => {
                if (timeFilter !== 'all' && item.time > parseInt(timeFilter)) return false;
                if (typeFilter !== 'all' && item.type !== typeFilter) return false;
                return true;
            });

            document.getElementById('resultCount').textContent = filtered.length;
            
            const results = document.getElementById('results');
            if (filtered.length === 0) {
                results.innerHTML = '<div class="no-results">沒有找到符合條件的幼兒園</div>';
                return;
            }

            results.innerHTML = filtered.map(item => `
                <div class="kindergarten-card ${item.rank <= 5 ? 'top' : ''}">
                    <a href="https://www.google.com/maps/dir/橫溪路99巷77號,三峽區,新北市/${encodeURIComponent(item.address)}" target="_blank">
                    <div class="card-header">
                        <div>
                            <span class="rank-badge">${item.rank}</span>
                            <span class="card-title">${item.name}</span>
                        </div>
                        <span class="card-badge badge-${item.type === '公立' ? 'public' : 'nonprofit'}">${item.type}</span>
                    </div>
                    <div class="card-distance">🚗 ${item.time} 分鐘 <small>(開車)</small></div>
                    <div class="card-info">
                        📍 ${item.address} &nbsp;|&nbsp; 👶 ${item.age}
                        ${item.people ? `&nbsp;|&nbsp; 👥 ${item.people}人` : ''}
                    </div>
                    <div class="convenience-tags">
                        ${item.tags.map(tag => `<span class="tag tag-${item.convenience}">${tag}</span>`).join('')}
                    </div>
                    </a>
                </div>
            `).join('');
        }

        document.querySelectorAll('#kindergarten-section .tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('#kindergarten-section .tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentData = tab.dataset.area === 'tucheng' ? tuchengData : sanxiaData;
                renderKindergarten();
            });
        });

        document.querySelectorAll('#kindergarten-section select').forEach(select => {
            select.addEventListener('change', renderKindergarten);
        });

        renderKindergarten();
    </script>
</body>
</html>
